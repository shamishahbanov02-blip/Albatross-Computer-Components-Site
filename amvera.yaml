meta:
  environment: nodejs
  toolchain:
    name: npm
    version: 20

build:
  commands:
    - npm install
    - npm run build
  artifacts:
    dist: dist
run:
  # Запуск статики через легковесный сервер serve (порт Amvera подставит автоматически или мы используем npx)
  command: npx serve -s dist -p 80
